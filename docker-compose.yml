services:
  postgres:
    image: postgres:15-alpine
    container_name: travelbuddy-postgres
    environment:
      POSTGRES_USER: travelbuddy
      POSTGRES_PASSWORD: travelbuddy_password
      POSTGRES_DB: travelbuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init_database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travelbuddy-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: travelbuddy-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@travelbuddy.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGPASSFILE: /var/lib/pgadmin/pgpass
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgadmin4/pgpass:ro
    networks:
      - travelbuddy-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelbuddy-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    networks:
      - travelbuddy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travelbuddy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - travelbuddy-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  travelbuddy-network:
    driver: bridge